server:
  port: 8080

# Ollama 本地模型配置（保留）
spring:
  application:
    name: springai
  config:
    import: optional:nacos:ark.yaml?group=DEFAULT_GROUP
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      config:
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
  ai:
    ollama:
      base-url: http://localhost:11434
      model: llama3
      timeout: 60000